# Snow Monitor Configuration
# ===========================

locations:
  popova_shapka:
    name: "Popova Shapka"
    country: "North Macedonia"
    lat: 42.0
    lon: 20.87
    timezone: "Europe/Belgrade"
    elevations:
      mid: 1900      # Mid-mountain — general resort skiing
      summit: 2400    # Summit / freeride zone
    aspects:
      primary: "north"          # Main freeride terrain faces north/NE
      primary_degrees: 0        # North = 0°

# Weather models to query via Open-Meteo /v1/forecast
models:
  - icon_seamless              # ICON-EU ~6.5km — best Balkan resolution
  - ecmwf_ifs025               # ECMWF IFS ~9km — gold standard medium-range
  - gfs_seamless               # GFS ~13km — extended range
  - arpege_seamless            # Arpege ~10km — Meteo-France
  - ukmo_seamless              # UKMO ~10km — UK Met Office

# AI weather models (also fetched via /v1/forecast in one request)
ai_models:
  - ecmwf_aifs025_single       # ECMWF AIFS ~25km — ML model rivaling IFS
  - gfs_graphcast025           # GFS GraphCast ~25km — Google DeepMind ML model

# Forecast parameters
forecast:
  days: 16              # Maximum forecast range
  update_times:         # Cron schedule (for reference)
    - "06:00"
    - "12:00"
    - "18:00"

# Powder scoring thresholds
scoring:
  # Gate check — below this, max score is 30 regardless of other factors
  min_snow_gate_cm: 5

  # Snow quantity scoring (0-40 points)
  snow:
    good_cm: 10         # Start of "good" range
    great_cm: 20        # Start of "great" range
    epic_cm: 30         # Diminishing returns above this

  # Temperature scoring (0-15 points)
  temperature:
    ideal_min: -8       # Lower end of ideal range (°C)
    ideal_max: -3       # Upper end of ideal range (°C)
    warm_penalty: -2    # Above this = wet snow, score drops
    cold_penalty: -20   # Below this = too cold, slight penalty

  # Wind scoring (0-10 points)
  wind:
    ideal_max_kmh: 10   # Full score below this
    poor_kmh: 25        # Zero score above this
    gust_danger_kmh: 50 # Flagged as dangerous

  # Freezing level (0-5 points)
  freezing_level:
    ideal_below_m: 1800 # Full score if below this
    danger_above_m: 2200 # Rain risk at freeride elevations

  # Soft gate (replaces hard 5cm cutoff)
  gate_floor_cm: 3
  gate_ceiling_cm: 7

  # Kalman filter bias correction
  kalman:
    process_noise_q: 0.01       # How fast bias can change between updates
    observation_noise_r: 1.0    # How noisy individual errors are
    initial_variance: 10.0      # Initial uncertainty for cold start
    lead_time_buckets:          # Forecast lead-time groupings for weight tracking
      - [0, 2]                  # Short-range (today to day 2)
      - [3, 5]                  # Medium-range
      - [6, 10]                 # Extended
      - [11, 16]                # Long-range

  snow_quality:
    slr_champagne: 15      # SLR above this = champagne powder
    slr_good: 12
    slr_ok: 8
    dpd_very_dry: 12       # dew point depression thresholds
    dpd_dry: 6
    dpd_saturated: 3
    humidity_dry: 50
    humidity_wet: 90
    temp_cold_bonus: -8
    temp_warm_limit: -2

  wind_loading:
    ideal_speed_min_kmh: 15
    ideal_speed_max_kmh: 35
    scour_speed_kmh: 40
    lee_angle_full: 30      # degrees off lee for full loading
    min_snow_cm: 2          # minimum fresh snow for transport

  # Alert thresholds
  alerts:
    min_score: 60              # Minimum powder score to trigger alert
    min_accumulation_48h_cm: 30 # 48h accumulation trigger
    storm_watch_days_ahead: 10  # How far ahead to watch for building storms
    storm_watch_min_score: 40   # Minimum score to flag in extended outlook

# Sky / experience scoring
sky:
  bluebird_max_cloud: 20       # % — below this = bluebird
  low_cloud_warning: 60        # % — flat light warning above this
  good_visibility_m: 30000     # 30km+ = excellent

# Notifications — Telegram only, credentials via environment variables:
#   TELEGRAM_BOT_TOKEN  — get from @BotFather
#   TELEGRAM_CHAT_ID    — your chat/group ID
notifications:
  telegram:
    enabled: true

# Web scrapers (supplementary sources)
scrapers:
  enabled: true
  timeout: 15                  # HTTP request timeout (seconds)
  snow_forecast:
    resort_key: "popova_shapka"
    levels: ["mid", "top"]     # bot=1670m, mid=2035m, top=2400m
  mountain_forecast:
    location_key: "popova_shapka"   # 1825m
  meteoblue:
    enabled: false             # Paid service — set true + METEOBLUE_API_KEY to enable
    api_key_env: "METEOBLUE_API_KEY"

# Forecast verification — compares predictions against ERA5 reanalysis
verification:
  enabled: true
  era5_lag_days: 5             # ERA5 reanalysis availability lag
  verification_window_days: 3  # Number of recent days to verify per run
  adaptive_weights: true       # Use verification data for adaptive model weighting

# Snow physics — DGZ and bluebird detection
snow_physics:
  dgz:
    ideal_700hpa_min: -16       # Lower bound of dendritic growth zone (°C)
    ideal_700hpa_max: -12       # Upper bound of dendritic growth zone (°C)
    extended_700hpa_min: -20    # Extended "good" range lower bound
    extended_700hpa_max: -8     # Extended "good" range upper bound
    bonus_points: 3             # Max DGZ bonus in snow quality scoring
  bluebird:
    ridge_gph_threshold: 5520   # 500hPa GPH above this = ridge (meters)
    strong_ridge_gph_threshold: 5580  # Strong ridge
    min_confidence: 60          # Minimum bluebird confidence for pattern detection

# Weather pattern detection
patterns:
  storm_then_clear:
    min_snow_cm: 10
    min_storm_cloud_pct: 70
    max_clear_cloud_pct: 40
    max_clear_wind_kmh: 20
    max_clear_temp_c: -2
    near_miss_relax_pct: 25
  multi_day_storm:
    min_daily_cm: 3
    min_consecutive_days: 3
  warming_trend:
    min_consecutive_days: 3
    danger_freezing_level_m: 2000
  cold_snap:
    min_temp_drop_c: 5
    max_final_temp_c: -5
  surface_hoar:
    max_cloud_pct: 20           # Clear sky threshold for radiative cooling
    min_humidity: 70            # Moisture needed for crystal growth
    max_wind_kmh: 10            # Calm wind needed for undisturbed growth
    max_temp_c: -5              # Cold enough for ice crystal formation

# Webcams — known camera URLs for Popova Shapka area
webcams:
  - name: "SkylineWebcams"
    url: "https://www.skylinewebcams.com/en/webcam/north-macedonia/polog/tetovo/popova-sapka.html"
    elevation: 1780
  - name: "Resort Camera 1"
    url: "https://popovashapka.com.mk/en/live-camera-3/"
    elevation: 1900
  - name: "Snow-Forecast"
    url: "https://www.snow-forecast.com/resorts/PopovaShapka/webcams/latest"
    elevation: 2035

# Data storage — outputs to docs/ for GitHub Pages
data:
  history_dir: "docs/history"
  latest_file: "docs/latest.json"
  dashboard_file: "docs/index.html"
